# A3' Ablation: w/o Offline Templates (keep Graph Slicing)
# Based on exp_p1.yaml. 保留依赖图切片，仅移除离线知识模板。
#
# 与 A3 (ablation_a3.yaml) 的关键区别：
#   A3:  oh_kb=null     → 去掉 E (图切片) + K_r (模板)
#        gw.enable_llm=false → 去掉 A (语义分析)
#   A3': oh_kb=graph_only              → 保留 E (图切片), 去掉 K_r (模板)
#        gw.enable_llm=true            → 保留 A (语义分析)
#        ao.enable_synthetic_knowledge=false → 去掉 AO 合成模板回退
#        gw.enable_rule_protocols=false      → 去掉 GW 硬编码规则修复协议
#        gw.enable_rule_mode=false           → 去掉 GW rule_mode 静态分析策略
#        cp.enable_rule_guide=false          → 去掉 CP 静态规则指引
#
# 目的：彻底切开依赖图切片（typed cycle）与离线知识模板（template KB）
#       各自的贡献，使消融实验更加精细。

runtime:
  repositories_root: ../../repositories
  runtime_root: ../runtime
  trace_root: ../runtime/traces
  keep_runtime: false
  execution_mode: docker_whole
  docker_image: harmonyrepair:with-codelinter
  docker_repo_path: /workspace/repo
  docker_code_path: /workspace/oh_mas_src
  docker_extra_args: ""
  max_retries: 2

oh_kb:
  provider: "graph_only"
  fail_open: true
  timeout_ms: 200
  max_items: 10
  seed_file: oh_kb_seed.json
  graph_root: ../runtime/graph_explore
  linter_examples_root: ../../oh-kb
  repair_experiences_path: ../../oh-kb/repair_experiences.json

ao:
  enable_llm_decision: true
  llm_model: openrouter/google/gemini-2.5-flash
  llm_model_class: openrouter
  llm_temperature: 0.0
  llm_max_tokens: 800
  llm_timeout: 30
  enable_synthetic_knowledge: false

gw:
  enable_llm: true
  llm_model: openrouter/anthropic/claude-sonnet-4.5
  llm_model_class: openrouter
  llm_temperature: 0.0
  llm_max_tokens: 20000
  llm_timeout: 60
  max_steps: 15
  deterministic_fallback: true
  llm_max_retries: 3
  llm_retry_delay: 1.0
  enable_rule_protocols: false
  enable_rule_mode: false

cp:
  provider: litellm
  backend: litellm
  worker_model_class: litellm
  temperature: 0.0
  max_tokens: 8000
  timeout: 90
  fallback_diff: false
  step_limit: 15
  step_limits_by_mode:
    easy: 10
    medium: 15
    hard: 20
  cost_limit: 3.0
  worker_trace_root: ../runtime/traces/cp_workers
  repo_root: ../../mini-swe-agent
  deterministic_test_mode: false
  max_parallel_workers: 3
  enable_rule_guide: false
  models_registry:
    - openrouter/anthropic/claude-sonnet-4.5
    - openrouter/google/gemini-2.5-flash
    - openrouter/moonshotai/kimi-k2.5
  mode_strategy:
    easy:
      - openrouter/anthropic/claude-sonnet-4.5
    medium:
      - openrouter/anthropic/claude-sonnet-4.5
      - openrouter/google/gemini-2.5-flash
    hard:
      - openrouter/anthropic/claude-sonnet-4.5
      - openrouter/google/gemini-2.5-flash
      - openrouter/moonshotai/kimi-k2.5

da:
  mode: strict
  repo_path: ../../mini-swe-agent
  execution_mode: host
  docker_image: harmonyrepair:latest
  docker_workdir: /workspace
  docker_extra_args: ""
  git_bin: git
  codelinter_bin: /usr/local/bin/codelinter
  cppcheck_bin: cppcheck
  require_tools_preflight: true
  codelinter_target_cmd: "{codelinter_bin} -f json -o {report_file} {target_file}"
  cppcheck_target_cmd: "{cppcheck_bin} --enable=all --suppress=missingIncludeSystem --suppress=missingInclude --xml --xml-version=2 {target_file}"
  codelinter_repo_cmd: "{codelinter_bin} -f json -o {report_file} {repo_path}"
  cppcheck_repo_cmd: "{cppcheck_bin} --enable=all --suppress=missingIncludeSystem --suppress=missingInclude --xml --xml-version=2 {repo_path}"
